name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PAGES_PROJECT: cheesestore-docs
      PAGES_BRANCH: main
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run build

      - name: Ensure Cloudflare Pages project exists
        run: |
          set -euo pipefail
          if ! npx --yes wrangler@4 pages project list --json | node -e '
            const fs = require("node:fs");
            const projects = JSON.parse(fs.readFileSync(0, "utf8"));
            process.exit(projects.some((project) => project.name === process.env.PAGES_PROJECT) ? 0 : 1);
          '; then
            npx --yes wrangler@4 pages project create "$PAGES_PROJECT" --production-branch "$PAGES_BRANCH"
          fi

      - name: Deploy docs to Cloudflare Pages
        run: |
          set -euo pipefail
          COMMIT_MESSAGE="$(git log -1 --pretty=%s)"
          npx --yes wrangler@4 pages deploy dist \
            --project-name="$PAGES_PROJECT" \
            --branch="$PAGES_BRANCH" \
            --commit-hash="$GITHUB_SHA" \
            --commit-message="$COMMIT_MESSAGE" \
            --commit-dirty=true
